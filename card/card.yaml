card:
  - Use a 11:19 aspect ratio for the output image
  - The card should have a black border.
  - The card should fill the remainder of the space.
  - The top section of the card should be a picture of clouds.  It has the elemental symbol for air, 🜁, in the center.
  - The next section of the card should be a picture of fire.  It has the elemental symbol for fire, 🜂, in the center.
  - The next section of the card should be a picture of water.  It has the elemental symbol for water, 🜄, in the center.
  - The next section of the card should be a picture of earth.  It has the elemental symbol for earth, 🜃, in the center.
  - Put a text box that says "JRUCS" in an elven font in the middle of the card.
  - The symbols and text should all look hand drawn, as if they were drawn with a pen or pencil.  The lines should be slightly wobbly and imperfect, to give it a more organic feel.
  - The images should be photorealistic.
